[build]
  command = "npm run build"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Stripe ships ESM; bundling it breaks netlify dev — load from node_modules at runtime.
  external_node_modules = ["stripe"]

[dev]
  command = "npm run dev --workspace=@bandie/web"
  targetPort = 5173
  port = 8888
  autoLaunch = true

[[redirects]]
  from = "/api/integrations/dropbox/connect"
  to = "/.netlify/functions/dropbox-connect"
  status = 200

[[redirects]]
  from = "/api/integrations/dropbox/callback"
  to = "/.netlify/functions/dropbox-callback"
  status = 200

[[redirects]]
  from = "/api/integrations/dropbox/disconnect"
  to = "/.netlify/functions/dropbox-disconnect"
  status = 200

[[redirects]]
  from = "/api/bands/song-part-storage/dropbox/setup"
  to = "/.netlify/functions/band-song-part-storage-setup"
  status = 200

[[redirects]]
  from = "/api/bands/song-part-storage/dropbox/health"
  to = "/.netlify/functions/band-song-part-storage-health"
  status = 200

[[redirects]]
  from = "/api/bands/song-part-files/upload"
  to = "/.netlify/functions/song-part-file-upload"
  status = 200

[[redirects]]
  from = "/api/bands/song-part-files/preview"
  to = "/.netlify/functions/song-part-file-preview"
  status = 200

[[redirects]]
  from = "/api/bands/song-part-files/download"
  to = "/.netlify/functions/song-part-file-download"
  status = 200

[[redirects]]
  from = "/api/billing/create-checkout"
  to = "/.netlify/functions/billing-create-checkout"
  status = 200

[[redirects]]
  from = "/api/billing/create-portal"
  to = "/.netlify/functions/billing-create-portal"
  status = 200

[[redirects]]
  from = "/api/billing/stripe-webhook"
  to = "/.netlify/functions/billing-stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/billing/setup-stripe-plans"
  to = "/.netlify/functions/billing-setup-stripe-plans"
  status = 200

# SPA fallback — production/deploy only (skipped during netlify dev)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Context = ["production", "deploy-preview", "branch-deploy"]}
